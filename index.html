<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Desktop</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <div id="app" class="weather-theme-sunny">
    <!-- 搜索区域 -->
    <header class="search-section">
      <div class="input-wrapper">
        <input id="city-input" type="text" placeholder="搜索城市..." spellcheck="false" />
        <span class="search-hint">Enter 查询</span>
      </div>
    </header>

    <!-- 主显示区域 -->
    <main id="weather-display">
      <div class="main-info">
        <div class="top-row">
          <div class="location">
            <h1 class="city-name">--</h1>
            <div class="subline">--</div>
          </div>
          <div class="current-weather">
            <div class="temp-val">--</div>
            <div class="weather-icon" id="weather-icon"></div>
          </div>
        </div>

        <div class="desc-text">--</div>
      </div>

      <section class="hourly-section">
        <div class="hourly-scroll" id="hourly"></div>
      </section>

      <div class="grid-details" id="details">
        <!-- cards populated by JS -->
      </div>

      <div class="placeholder-msg" id="placeholder">输入城市开始探索</div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
