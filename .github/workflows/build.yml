name: Build Android App
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm install

      - name: Tauri Android Init
        # 去掉 --yes，改用 printf 直接喂入回车来跳过交互提示
        run: printf '\n\n\n\n' | npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Build Android Debug APK
        run: npx tauri android build --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # 使用通配符 **/*.apk，让它自动在 android 目录下搜寻所有生成的 apk
          path: src-tauri/gen/android/**/*.apk