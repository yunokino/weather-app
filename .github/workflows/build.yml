name: Build Android App
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 重点 1：只安装 arm64 架构，加快编译速度
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm install

      - name: Tauri Android Init
        # 如果你本地已经生成过 gen 文件夹并提交了，这步甚至可以省略
        run: printf '\n\n\n\n' | npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Build Android Release APK
        # 重点 2：改用 --release，并指定 --target 为 aarch64 (即 arm64-v8a)
        run: npx tauri android build -- --release --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64
          # 重点 3：输出路径会变为 release 文件夹下
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk