name: Build Android App
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm install

      - name: Tauri Android Init
        run: printf '\n\n\n\n' | npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Build Android Release APK
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      # 重点更改 1：搜索并列出所有生成的 APK 文件，方便在日志中排查位置
      - name: Find APKs
        run: |
          echo "Listing all APK files found in the project:"
          find . -name "*.apk"
          # 将找到的第一个 APK 路径存入环境变量，备用
          echo "APK_PATH=$(find src-tauri/gen/android -name "*.apk" | head -n 1)" >> $GITHUB_ENV

      # 重点更改 2：使用更宽泛的路径匹配，或者使用上一步找到的具体路径
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-arm64
          # 使用递归通配符 ** 搜索所有可能的 apk 路径
          # 这能解决 Gradle 目录结构与预期不符的问题（例如在 debug/release 或不同 abi 目录下）
          path: |
            src-tauri/gen/android/**/*.apk
            !src-tauri/gen/android/**/build-cache/**
          if-no-files-found: error